REVIEWER_1_NAME: "Guillermo Lopez"
REVIEWER_1_DATE: "2 months ago"
REVIEWER_1_TEXT: "Premier Martial Arts has been an incredible experience for our 5-year-old daughter! It's been so much fun watching her progress, not just in karate skills, but also in confidence and discipline. The instructors are fantastic with all the children, creating a positive and encouraging learning environment. We especially love the Friday night 'Parents' Night Out' — what a fantastic perk! We highly recommend Premier Martial Arts to any family looking for a great martial arts program for their kids."

REVIEWER_2_NAME: "Anita S."
REVIEWER_2_DATE: "3 months ago"
REVIEWER_2_TEXT: "This is a great martial art school. My son Michael started off doing white belt training, he was switched to blackbelt training and is doing great. All of the instructors are hands-on. They work with the kids. They give them the attention and discipline that they need. I would highly recommend this school."

REVIEWER_3_NAME: "Yesenia M."
REVIEWER_3_DATE: "1 month ago"
REVIEWER_3_TEXT: "Our daughter absolutely loves Premier Martial Arts, they are such a great community, they love teaching children and it shows — our daughter looks forward to her weekly classes here!!"

REVIEWER_4_NAME: "Jennifer L."
REVIEWER_4_DATE: "2 months ago"
REVIEWER_4_TEXT: "My son has been coming to PMA for 6 years now. He loves the classes, camps, and the teachers. We love the life skills and knowledge they are teaching him — far beyond just martial arts while having fun."

REVIEWER_5_NAME: "Jasiel Morales"
REVIEWER_5_DATE: "1 month ago"
REVIEWER_5_TEXT: "We absolutely love PMA! My son Oliver (7yo) has been at PMA for a few months now. His progress has been amazing in such a short time — not only in martial art skills, but he's also more confident and disciplined. The instructors are all very knowledgeable, respectful, and treat everyone like family. The owner, Mr. Asesor, and the office manager, Mr. Vega, make us feel like family. I recommend PMA wholeheartedly!"

REVIEWER_6_NAME: "Michelle Humphreys"
REVIEWER_6_DATE: "2 months ago"
REVIEWER_6_TEXT: "PMA is a great school! My son started when he was 3 years old when his neurologist suggested karate to help with behavioral issues. They welcomed him with open arms. In the past 2 years he's shown tremendous improvement. They work hard on technical skill but for me the value is in character building. He looks forward to class. The instructors are kind yet firm — it's a safe space for all ages."

